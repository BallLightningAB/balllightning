  - date: "2026-03-06"
    version: "0.2.7"
    issue: "https://github.com/BallLightningAB/balllightning/issues/19"
    commit: 7b0604e
    status: in-review
    title: "feat(analytics): implement centralized analytics gate with GA4 SPA tracking and gated Vercel Web Analytics"
    details: |-
      - Added src/lib/analytics/AnalyticsMount.tsx as single root analytics gate
      - GA4 now uses VITE_GA4 with VITE_ANALYTICS_MODE=none|ga4|ga4_vercel_analytics
      - GA4 initializes with send_page_view:false and sends manual page_view events on initial load and TanStack Router navigation changes
      - Removed inline GA4 script injection from src/routes/__root.tsx and replaced with single <AnalyticsMount />
      - Added @vercel/analytics dependency and gated <Analytics /> to ga4_vercel_analytics mode only
      - Updated .env.example to document supported analytics mode values
      - Fixed biome.json includes to resolve Biome lint conflicts with extended packages
      - Validation passed with pnpm install, pnpm run lint, pnpm run typecheck, and pnpm run build
      - Mode contract uses ga4_vercel_analytics now to preserve future-safe naming for later Speed Insights addition

      Refs: v0.2.7 #19 I19D1-I19D5

