    details: |-
      - Added I14D8: Change locale route from 'sv' to 'se' to align with ISO 3166-1 standard
      - Added I14D9: Update language menu labels - rename 'gb' to 'en' for consistency
      - Created GitHub issue #16 for comprehensive portfolio subpage translation project
      - Updated issue #14 with expanded scope and related issue references
      - Added sub-issue linking between translation work and portfolio content
