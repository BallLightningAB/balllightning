    commit: 44fcbac
    status: ready
    title: "fix(i18n): add missing /sv/ and /sv/:path* redirects to prevent fallback to /en/sv"
    details: |- 
      - Added /sv/ redirect pattern to catch Swedish root route with trailing slash
      - Added /sv/:path* redirect pattern to catch all Swedish sub-routes
      - Fixed issue where /sv/ was treated as path segment under /en/sv instead of redirecting to /se
