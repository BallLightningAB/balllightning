  - date: "2026-03-03"
    version: "0.2.5.0"
    issue: "https://github.com/BallLightningAB/balllightning/issues/14"
    commit: 9594f3b
    status: in-review
    title: "fix(i18n): implement German translation and mobile responsiveness feedback fixes"
    details: |-
      - FIXED I14D1: Updated 'Liefern' translation to 'shippen' in German locale
      - FIXED I14D2: Replaced SEK with EUR for English/German/French locales (kept SEK for Swedish)
      - FIXED I14D3: Translated technology category labels on technologies page using Paraglide messages
      - FIXED I14D4: Translated all portfolio section content (titles, subtitles, descriptions, tags) across all locales
      - FIXED I14D5: Updated logo to use transparent WebP version (logo-60x60-transparent.webp) in Header and Footer
      - FIXED I14D6: Added comprehensive overflow-x hidden rules to prevent mobile horizontal scrolling
      - FIXED I14D7: Updated Twitter link from @nicbrulay to @BallLightningAB in Header navigation
      - Created GitHub issue #14 to collect br1dge's feedback on German translation and mobile responsiveness
      - Added issue to memory bank with 7 deliverables, all completed
      
      Refs: v0.2.5.0 #14 I14D1-I14D7

  - date: "2026-03-03"
    version: "0.2.4.9"
    issue: "https://github.com/BallLightningAB/balllightning/issues/13"
    commit: 3eb35ef
    status: in-review
    title: "fix(mobile): language switcher cut off in navigation menu"
    details: |-
      - Replaced unreliable Radix Select with Sheet component for consistent mobile positioning
      - Simplified to show only flag emojis with ultra-compact 25vw width (200px max)
      - Applied Big Shoulders Stencil font for brand consistency and proper accessibility
      - Moved language switcher from mobile menu to header (next to hamburger)
      - Added proper touch targets and optimized mobile responsiveness
      - Final result: Ultra-compact language switcher (64-124px on phones) with centered flags
      
      Refs: v0.2.4.9 #13 I13D1-I13D5

  - date: "2026-03-03"
    version: "0.2.4.8"
    issue: "https://github.com/BallLightningAB/balllightning/issues/12"
    commit: 753eaa8
    status: in-review
    title: "fix(i18n): capture current path at language switching moment instead of render time"
    details: |-
      - Fixed language switcher to capture window.location.pathname at moment of switching, not component render
      - Updated handleLocaleChange to use switchingPath instead of stale currentPath from render time
      - Updated LanguageSwitcherMobile to capture path at click time inside map function
      - Enhanced debug logging to show renderPath vs switchingPath comparison
      - Root cause: Component was using stale path captured at initial render, causing wrong redirects
      - Now properly preserves current page context: /sv/services → switch to German → /de/services
      
      Refs: v0.2.4.8 #12 I12D1-I12D2

  - date: "2026-03-03"
    version: "0.2.4.7"
    issue: "https://github.com/BallLightningAB/balllightning/issues/12"
    commit: d0c39d6
    status: in-review
    title: "fix(i18n): add debugging to language switcher for path detection issues"
    details: |-
      - Added console logging to LanguageSwitcher component to debug path detection
      - Debug logs show currentPath, currentLocale, newLocale, basePath, and href
      - Deployed with debug logging to investigate why language switching always redirects to /technologies
      - Issue: language switching from any page (e.g., /en/portfolio) redirects to /de/technologies instead of /de/portfolio
      - Debug logging will help identify if issue is with path detection, locale detection, or localizeHref function
      
      Refs: v0.2.4.7 #12 I12D1-I12D2

  - date: "2026-03-03"
    version: "0.2.4.6"
    issue: "changelog-rotation-fix"
    commit: be83f3e
    status: in-review
    title: "chore: fix changelog rotation script naming and implement quarterly archives"
    details: |-
      - Modified scripts/rotate-changelog.sh to archive entries by quarter (2026-Q1.yaml) instead of monthly (2026-03.yaml)
      - Updated extract_entry_month function to extract_entry_quarter with proper quarter calculation (Q1=Jan-Mar, Q2=Apr-Jun, Q3=Jul-Sep, Q4=Oct-Dec)
      - Updated scripts/rotate-changelog.sh to use proper naming scheme: changelog-archive-{quarter}-{number}.yaml
      - Added get_next_archive_number() function to increment archive numbers (e.g., changelog-archive-2026-Q1-1.yaml)
      - Fixed archive ordering to maintain reverse chronological order (newest first) like main changelog
      - Updated archive file creation to prepend entries instead of append
      - Manually recreated changelog-archive-2026-Q1-1.yaml with proper reverse chronological ordering
      - Removed old unknown-dates.yaml file and replaced with properly named archive
      - Ran rotation to reduce CHANGELOG.yaml from 691 to 195 lines (moved 496 entries to archives)
      
      Refs: v0.2.4.6 changelog-rotation-fix

  - date: "2026-03-03"
    version: "0.2.4.5"
    issue: "https://github.com/BallLightningAB/balllightning/issues/12"
    commit: TBD
    status: in-review
    title: "fix(i18n): preserve current page when switching languages"
    details: |-
      - Fixed language switcher to strip current locale prefix before localizing to new locale
      - Updated both desktop (Select) and mobile (buttons) language switchers with base path logic
      - Now switching from /en/technologies to German redirects to /de/technologies instead of /de
      - Preserves user's current page context across all locale switches
      - Applied to LanguageSwitcher and LanguageSwitcherMobile components
      
      Refs: v0.2.4.5 #12 I12D1-I12D2

  - date: "2026-03-03"
    version: "0.2.4.4"
    issue: "https://github.com/BallLightningAB/balllightning/issues/12"
    commit: fabe94d
    status: in-review
    title: "fix(i18n): restore URL strategy and fix middleware/rewrite interference for locale routing"
    details: |-
      - Restored URL strategy + urlPatterns in Paraglide config to recognize /de, /sv, /fr routes
      - Adjusted paraglideMiddleware callback to use original request instead of rewritten request
      - Kept TanStack Router rewrite (deLocalizeUrl/localizeUrl) for client-side URL localization
      - Verified /de/ route now returns 200 OK with German content (lang="de", "Startseite" labels)
      - Confirmed URL strategy overrides cookie preference when accessing locale-prefixed routes
      - Fixed redirect loops while maintaining functional language switching
      
      Refs: v0.2.4.4 #12 I12D1-I12D2

  - date: "2026-03-03"
    version: "0.2.4.3"
    issue: "https://github.com/BallLightningAB/balllightning/issues/12"
    commit: 58699af
    status: in-review
    title: "fix(vercel): resolve production 500 errors via runtime pin + i18n rewrite conflict fix"
    details: |-
      - Pinned Nitro Vercel function runtime to nodejs24.x to prevent nodejs22.x output in generated Nitro config
      - Fixed Paraglide middleware resolve callback to forward rewritten request object to TanStack handler
      - Removed URL strategy from Paraglide to avoid conflicts with TanStack Router rewrite
      - Kept TanStack Router rewrite (deLocalizeUrl/localizeUrl) for client-side URL localization
      - Verified build output now contains runtime nodejs24.x via nitro.json
      - Confirmed production deployment working: https://balllightning.cloud/ (200 OK)
      - Confirmed localized routes working: https://balllightning.cloud/en (200 OK)
      
      Refs: v0.2.4.3 #12 I12D1-I12D2

  - date: "2026-03-03"
    version: "0.2.4.2"
    issue: "https://github.com/BallLightningAB/balllightning/issues/12"
    commit: 394f38f
    status: in-progress
    title: "fix(vercel): resolve production 500 errors via runtime pin + i18n rewrite conflict fix"
    details: |-
      - Pinned Nitro Vercel function runtime to nodejs24.x to prevent nodejs22.x output in generated Nitro config
      - Fixed Paraglide middleware resolve callback to forward rewritten request object to TanStack handler
      - Removed TanStack Router rewrite (deLocalizeUrl/localizeUrl) to avoid double URL localization with Paraglide middleware
      - Verified build output now contains runtime nodejs24.x via nitro.json
      - Kept outputStructure: 'message-modules' in paraglideVitePlugin since removing it broke dev environment
      
      Refs: v0.2.4.2 #12 I12D1-I12D2

  - date: "2026-03-02"
    version: "0.2.4.1"
    issue: "https://github.com/BallLightningAB/balllightning/issues/12"
    commit: bff36ad
    status: in-progress
    title: "fix(vercel): add URLPattern polyfill for Node runtime compatibility"
    details: |-
      - Added urlpattern-polyfill dependency to resolve ReferenceError: URLPattern on Vercel Node runtime
      - Imported polyfill at top of src/server.ts before Paraglide middleware to ensure global availability
      - Investigated local preview server conflicts with Node 24 native URLPattern support
      - Confirmed polyfill is no-op when URLPattern global exists, safe for local development
      - Local preview server limitation acceptable; production deployment should resolve 500 errors
      
      Refs: v0.2.4.1 #12 I12D1-I12D2

  - date: "2026-03-02"
    version: "0.2.4.0"
    issue: "https://github.com/BallLightningAB/balllightning/issues/12"
    commit: c2b07ea
    status: in-progress
    title: "fix(vercel): add URLPattern polyfill for Node runtime compatibility"
    details: |-
      - Added urlpattern-polyfill dependency to resolve ReferenceError: URLPattern on Vercel Node runtime
      - Imported polyfill at top of src/server.ts before Paraglide middleware to ensure global availability
      - Fixes production 500 errors caused by Paraglide's extractLocaleFromUrl using URLPattern
      - Polyfill is no-op when URLPattern global exists; safe for local Node 24 environments
      
      Refs: v0.2.4.0 #12 I12D1-I12D2

  - date: "2026-03-02"
    version: "0.2.3.9"
    issue: "https://github.com/BallLightningAB/balllightning/issues/10"
    commit: b4c9ea5
    status: completed
    title: "fix(vercel): replace invalid header route pattern"
    details: |-
      - Replaced combined regex header route with per-extension patterns (/:path*.css, /:path*.js, /:path*.png, etc.)
      - Aligns with Vercel path-to-regexp requirements to avoid invalid route source pattern error
      - Keeps long-term caching headers for static assets while remaining Vercel-compatible

      Refs: v0.2.3.9 #10 I10D5

  - date: "2026-03-02"
    version: "0.2.3.8"
    issue: "https://github.com/BallLightningAB/balllightning/issues/10"
    commit: b4c9ea5
    status: completed
    title: "fix(vercel): add corepack support for pnpm deployment"
    details: |-
      - Added 'vercel-build' script to package.json with corepack enable
      - Updated vercel.json buildCommand to use 'pnpm run vercel-build'
      - Ensures pnpm 10.23.0 is properly activated during Vercel builds
      - Fixes deployment issues after pnpm migration where Vercel wasn't triggering
      - Build process now: corepack enable → pnpm run build
      
      Refs: v0.2.3.8 #10 I10D5

  - date: "2026-03-02"
    version: "0.2.3.7"
    issue: "https://github.com/BallLightningAB/balllightning/issues/10"
    commit: b4c9ea5
    status: completed
    title: "fix(ci): remove test step from GitHub Actions workflow"
    details: |-
      - Removed 'Test' step from .github/workflows/ci.yml since project has no test files
      - Fixes CI build failure: 'ReferenceError: module is not defined' in Vitest
      - Vitest was failing due to ES module issues when no test files exist
      - CI workflow now runs: typecheck → lint → build (no test step)
      - Test step can be re-added when actual test files are created
      
      Refs: v0.2.3.7 #10 I10D4

  - date: "2026-03-02"
    version: "0.2.3.6"
    issue: "https://github.com/BallLightningAB/balllightning/issues/4"
    commit: b4c9ea5
    status: completed
    title: "fix(ci): use correct pnpm dlx command for Paraglide file generation"
    details: |-
      - Replaced incorrect 'pnpm inlang project compile' with 'pnpm dlx @inlang/paraglide-js compile'
      - Uses pnpm dlx for consistency with pnpm-based project instead of npx
      - Specifies project file (--project ./project.inlang) and output directory (--outdir ./src/paraglide)
      - Fixes CI build error: "error: unknown command 'project'"
      - Ensures Paraglide files are properly generated before type checking
      
      Refs: v0.2.3.6 #4 I4D5

  - date: "2026-03-02"
    version: "0.2.3.5"
    issue: "https://github.com/BallLightningAB/balllightning/issues/4"
    commit: 579e4bc
    status: completed
    title: "fix(ci): add Paraglide file generation to GitHub Actions workflow"
    details: |-
      - Added "Generate Paraglide files" step to .github/workflows/ci.yml before type check
      - Ensures i18n files are available during CI builds since they are gitignored
      - Uses pnpm inlang project compile to generate Paraglide files
      - Fixes CI builds that would fail due to missing generated TypeScript files
      - Step placed after dependency installation, before type checking
      
      Refs: #4 I4D5

  - date: "2026-03-02"
    version: "0.2.3.4"
    issue: "https://github.com/BallLightningAB/balllightning/issues/10"
    commit: 0c5bf63
    status: completed
    title: "fix(types): exclude archived content migration from TypeScript compilation"
    details: |-
      - Added exclude field to tsconfig.json to skip specs/archived/**/* directory
      - Resolves 46 TypeScript errors from old Next.js code in content migration files
      - Fixes build failures while preserving archived content for reference
      - Typecheck now passes successfully with exit code 0
      
      Refs: #10 I10D3

  - date: "2026-03-02"
    version: "0.2.3.3"
    issue: "https://github.com/BallLightningAB/balllightning/issues/10"
    commit: c08c76e
    status: completed
    title: "fix(ci): correct package manager guard placement in GitHub Actions"
    details: |-
      - Moved "Guard package manager" step to run after lockfile validation, before installation
      - Ensures guard validates package manager before any installation occurs
      - Provides early failure detection if wrong package manager is used
      - Corrects workflow order: checkout → prepare pnpm → setup-node → fail npm lockfile → guard → install
      
      Refs: #10 I10D3

